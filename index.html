<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>占い用 精密測定コンパス（真北・磁北二重ダイヤル）</title>
<link rel="apple-touch-icon" href="icon.png">
<link rel="icon" href="icon.png">
<style>
  /* --- 基本スタイル --- */
  body {
    font-family: 'Helvetica Neue', Arial, sans-serif;
    background-color: #000;
    color: #fff;
    text-align: center;
    padding: 0;
    margin: 0;
    overflow: hidden;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }

  /* 全体のレイアウト構成 */
  .main-content {
    display: flex;
    flex-direction: column;
    height: 100vh; /* 画面全体の高さを使う */
    justify-content: space-between;
    padding: 10px;
    box-sizing: border-box;
  }

  /* プレイスホルダー（起動前） */
  #startup-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background-color: rgba(0,0,0,0.9);
    z-index: 200;
    display: flex; flex-direction: column; justify-content: center; align-items: center;
  }
  #startup-overlay h1 { font-size: 20px; margin-bottom: 20px; }
  #start-btn {
    background-color: #ff5252; color: white; border: none;
    padding: 12px 24px; font-size: 18px; border-radius: 5px; cursor: pointer;
    font-weight: bold; box-shadow: 0 4px 10px rgba(255,82,82,0.4);
  }

  /* セクションラベル */
  .section-label {
    font-size: 16px;
    font-weight: bold;
    color: #ff5252;
    margin-bottom: 5px;
    text-align: center;
  }

  /* 上部エリア（測定地域） */
  .header-controls {
    flex: 0 0 auto;
    background: rgba(20, 20, 20, 0.8);
    padding: 15px;
    border-radius: 8px;
    margin-bottom: 10px;
  }
  .region-setting { font-size: 12px; margin-bottom: 10px; color: #aaa; }
  select {
    padding: 5px 10px; background-color: #333; color: #fff;
    border: 1px solid #555; border-radius: 4px; font-size: 14px;
    width: 100%;
    box-sizing: border-box;
  }

  /* 精密表示パネル */
  #display-panel {
    display: flex; justify-content: space-around;
    font-family: 'Courier New', Courier, monospace;
    padding: 5px; border-top: 1px solid #333;
  }
  .heading-block { text-align: center; }
  .heading-label { font-size: 11px; color: #888; }
  .heading-val { font-size: 28px; font-weight: bold; }
  .true-val { color: #ff5252; } /* 真方位は赤 */
  .mag-val { color: #448aff; }  /* 磁方位は青 */

  /* 中央エリア（方位とコンパス） */
  .compass-section {
    flex: 1 1 auto;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding-bottom: 30px; /* ★ここに追加：下部に余白を作って全体を約7mm上に押し上げる★ */
  }

  /* --- コンパス盤面のデザイン --- */
  .compass-container {
    position: relative;
    width: 340px; height: 340px;
    margin: 10px 0 0 0; /* 下のmarginを消して上に詰める */
  }

  /* スマホ上部を示す固定の中心線（赤い矢印） */
  .center-mark {
    position: absolute; top: 0px; left: 50%;
    width: 2px; height: 175px;
    background: rgba(255, 0, 0, 0.8);
    transform: translateX(-50%); z-index: 150;
  }
  .center-mark::after {
    content: ''; position: absolute; top: 0; left: 50%;
    transform: translate(-50%, -100%);
    border-left: 8px solid transparent; border-right: 8px solid transparent;
    border-bottom: 12px solid rgba(255, 0, 0, 0.8);
  }
  .center-dot {
    position: absolute; top: 50%; left: 50%;
    width: 8px; height: 8px; background: #fff; border-radius: 50%;
    transform: translate(-50%, -50%); z-index: 160;
  }

  /* 回転するメイン盤面（真方位基準） */
  #main-dial {
    width: 100%; height: 100%;
    position: absolute; top: 0; left: 0;
    transform-origin: center center;
    transition: transform 0.05s linear;
  }

  /* ============================== */
  /* 外側：真方位ダイヤル */
  /* ============================== */
  .outer-ring {
    width: 100%; height: 100%; position: absolute;
    border-radius: 50%; border: 2px solid #555; box-sizing: border-box;
  }
  .label-true { position: absolute; font-weight: bold; color: #ff5252; z-index: 50; }
  .label-true.n { top: 15px; left: 50%; transform: translateX(-50%); font-size: 26px; }
  .label-true.e { top: 50%; right: 15px; transform: translateY(-50%); font-size: 20px; }
  .label-true.s { bottom: 15px; left: 50%; transform: translateX(-50%); font-size: 20px; }
  .label-true.w { top: 50%; left: 15px; transform: translateY(-50%); font-size: 20px; }
  .svg-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; }

  /* ============================== */
  /* 内側：磁方位ダイヤル */
  /* ============================== */
  #inner-ring {
    width: 66%; height: 66%;
    position: absolute; top: 17%; left: 17%;
    border-radius: 50%; background-color: rgba(20,20,20,0.5);
    border: 1px solid #333;
    transform-origin: center center; z-index: 20;
  }
  .label-mag { position: absolute; font-weight: bold; color: #448aff; z-index: 60; }
  .label-mag.n { top: 15px; left: 50%; transform: translateX(-50%); font-size: 18px; }
  .label-mag.e { top: 50%; right: 12px; transform: translateY(-50%); font-size: 14px; }
  .label-mag.s { bottom: 15px; left: 50%; transform: translateX(-50%); font-size: 14px; }
  .label-mag.w { top: 50%; left: 12px; transform: translateY(-50%); font-size: 14px; }
</style>
</head>
<body>

  <div id="startup-overlay">
    <h1>占い用 精密コンパス</h1>
    <button id="start-btn">測定開始</button>
  </div>

  <div class="main-content">
    <div class="header-controls">
      <div class="section-label">測定地域</div>
      <div class="region-setting">
        <select id="region-selector">
          <option value="-9.5">札幌市周辺 (~西偏9.5°)</option>
          <option value="-8.8">仙台市周辺 (~西偏8.8°)</option>
          <option value="-7.9">東京都周辺 (~西偏7.9°)</option>
          <option value="-7.8" selected>名古屋・伊賀周辺 (~西偏7.8°)</option>
          <option value="-7.6">大阪市周辺 (~西偏7.6°)</option>
          <option value="-7.4">広島市周辺 (~西偏7.4°)</option>
          <option value="-7.3">福岡市周辺 (~西偏7.3°)</option>
          <option value="-5.5">那覇市周辺 (~西偏5.5°)</option>
        </select>
      </div>
      <div id="display-panel">
        <div class="heading-block">
          <div class="heading-label">真方位</div>
          <div class="heading-val true-val" id="true-heading-display">---.-°</div>
        </div>
        <div class="heading-block">
          <div class="heading-label">磁方位</div>
          <div class="heading-val mag-val" id="mag-heading-display">---.-°</div>
        </div>
      </div>
    </div>

    <div class="compass-section">
      <div class="section-label">方位</div>
      
      <div class="compass-container">
        <div class="center-mark"></div>
        <div class="center-dot"></div>
        
        <div id="main-dial">
          <div class="outer-ring">
            <div class="label-true n">真北</div>
            <div class="label-true e">真東</div>
            <div class="label-true s">真南</div>
            <div class="label-true w">真西</div>
            <svg class="svg-layer" viewBox="0 0 340 340" id="outer-svg"></svg>
          </div>

          <div id="inner-ring">
            <div class="label-mag n">磁北</div>
            <div class="label-mag e">磁東</div>
            <div class="label-mag s">磁南</div>
            <div class="label-mag w">磁西</div>
            <svg class="svg-layer" viewBox="0 0 340 340" id="inner-svg" style="width: 100%; height: 100%; position: absolute; top:0; left:0;"></svg>
          </div>
        </div>
      </div>
      </div>
  </div>

  <script>
    const startBtn = document.getElementById('start-btn');
    const overlay = document.getElementById('startup-overlay');
    const mainDial = document.getElementById('main-dial');
    const innerRing = document.getElementById('inner-ring');
    const regionSelector = document.getElementById('region-selector');
    const trueDisplay = document.getElementById('true-heading-display');
    const magDisplay = document.getElementById('mag-heading-display');

    function generateOuterMarks() {
      const svg = document.getElementById('outer-svg');
      const cx = 170, cy = 170, r = 165;
      let html = '';
      for (let i = 0; i < 360; i++) {
        const angleRad = (i - 90) * (Math.PI / 180);
        let x1, y1, strokeWidth, strokeColor;

        if (i % 90 === 0) {
          x1 = cx + (r - 20) * Math.cos(angleRad);
          y1 = cy + (r - 20) * Math.sin(angleRad);
          strokeWidth = 3; strokeColor = "#ff5252";
        } else if (i % 10 === 0) {
          x1 = cx + (r - 12) * Math.cos(angleRad);
          y1 = cy + (r - 12) * Math.sin(angleRad);
          strokeWidth = 1.5; strokeColor = "#888";
          if (i % 30 === 0 && i % 90 !== 0) {
             const tx = cx + (r - 28) * Math.cos(angleRad);
             const ty = cy + (r - 28) * Math.sin(angleRad);
             html += `<text x="${tx}" y="${ty}" text-anchor="middle" dy="4" font-size="10" fill="#666" font-weight="bold" transform="rotate(${i+90} ${tx},${ty})">${i}</text>`;
          }
        } else if (i % 5 === 0) {
          x1 = cx + (r - 8) * Math.cos(angleRad);
          y1 = cy + (r - 8) * Math.sin(angleRad);
          strokeWidth = 1; strokeColor = "#555";
        } else {
          x1 = cx + (r - 5) * Math.cos(angleRad);
          y1 = cy + (r - 5) * Math.sin(angleRad);
          strokeWidth = 0.5; strokeColor = "#333";
        }
        const x2 = cx + r * Math.cos(angleRad);
        const y2 = cy + r * Math.sin(angleRad);
        html += `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="${strokeColor}" stroke-width="${strokeWidth}" />`;
      }
      svg.innerHTML = html;
    }

    function generateInnerMarks() {
      const svg = document.getElementById('inner-svg');
      const cx = 170, cy = 170, r = 165; 
      let html = '';
      for (let i = 0; i < 360; i+=5) {
        const angleRad = (i - 90) * (Math.PI / 180);
        let x1, y1, strokeWidth, strokeColor;

        if (i % 90 === 0) {
          x1 = cx + (r - 25) * Math.cos(angleRad);
          y1 = cy + (r - 25) * Math.sin(angleRad);
          strokeWidth = 4; strokeColor = "#448aff";
        } else if (i % 10 === 0) {
          x1 = cx + (r - 10) * Math.cos(angleRad);
          y1 = cy + (r - 10) * Math.sin(angleRad);
          strokeWidth = 1.5; strokeColor = "#555";
        } else {
          x1 = cx + (r - 5) * Math.cos(angleRad);
          y1 = cy + (r - 5) * Math.sin(angleRad);
          strokeWidth = 1; strokeColor = "#333";
        }
        const x2 = cx + r * Math.cos(angleRad);
        const y2 = cy + r * Math.sin(angleRad);
        html += `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="${strokeColor}" stroke-width="${strokeWidth}" />`;
      }
      svg.innerHTML = html;
    }

    generateOuterMarks();
    generateInnerMarks();

    let currentDeclination = parseFloat(regionSelector.value);
    innerRing.style.transform = `rotate(${currentDeclination}deg)`;

    regionSelector.addEventListener('change', (e) => {
      currentDeclination = parseFloat(e.target.value);
      innerRing.style.transform = `rotate(${currentDeclination}deg)`;
    });

    startBtn.addEventListener('click', () => {
      if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
        DeviceOrientationEvent.requestPermission()
          .then(permissionState => {
            if (permissionState === 'granted') activateCompass();
            else alert('設定アプリからブラウザのモーションセンサーのアクセス許可を確認してください。');
          })
          .catch(console.error);
      } else {
        activateCompass();
      }
    });

    function activateCompass() {
      overlay.style.display = 'none';
      if ('ondeviceorientationabsolute' in window) {
        window.addEventListener('deviceorientationabsolute', handleOrientation, true);
      } else if ('ondeviceorientation' in window) {
        window.addEventListener('deviceorientation', handleOrientation, true);
      }
    }

    function handleOrientation(event) {
      let compassHeading = null;
      if (event.webkitCompassHeading !== undefined) compassHeading = event.webkitCompassHeading;
      else if (event.alpha !== null) compassHeading = 360 - event.alpha;

      if (compassHeading !== null) {
        let magHeading = compassHeading;
        if(magHeading < 0) magHeading += 360;
        if(magHeading >= 360) magHeading -= 360;

        let trueHeading = magHeading + currentDeclination; 
        if(trueHeading < 0) trueHeading += 360;
        if(trueHeading >= 360) trueHeading -= 360;

        mainDial.style.transform = `rotate(${-trueHeading}deg)`;
        trueDisplay.textContent = trueHeading.toFixed(1) + '°';
        magDisplay.textContent = magHeading.toFixed(1) + '°';
      }
    }
  </script>
</body>
</html>

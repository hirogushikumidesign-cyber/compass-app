<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>占い用 盤面コンパス</title>
<style>
  body {
    font-family: 'Helvetica Neue', Arial, sans-serif;
    background-color: #f7f7f7;
    text-align: center;
    padding: 20px;
    margin: 0;
  }
  .settings {
    background: #fff;
    padding: 15px;
    border-radius: 10px;
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    margin-bottom: 30px;
  }
  /* コンパス盤面のデザイン */
  .compass-wrapper {
    position: relative;
    width: 280px;
    height: 280px;
    margin: 0 auto;
  }
  .dial {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    border: 4px solid #333;
    background: #fff;
    position: absolute;
    top: 0; left: 0;
    transition: transform 0.1s ease-out; /* スムーズに回転させる */
  }
  /* 東西南北のラベル */
  .label { position: absolute; font-weight: bold; font-size: 24px; }
  .n { top: 10px; left: 50%; transform: translateX(-50%); color: #d32f2f; } /* 真北（赤） */
  .e { top: 50%; right: 15px; transform: translateY(-50%); }
  .s { bottom: 10px; left: 50%; transform: translateX(-50%); }
  .w { top: 50%; left: 15px; transform: translateY(-50%); }
  
  /* 磁北のマーク（青） */
  .mag-n {
    position: absolute;
    top: 15px;
    left: 50%;
    font-size: 16px;
    color: #1976d2;
    /* 名古屋の西偏約7.5度を初期値として左にズラす */
    transform: translateX(-50%) rotate(-7.5deg);
    transform-origin: 50% 125px; /* 回転の軸を円の中心に設定 */
  }

  /* スマホの向いている方向を示す中心の線 */
  .center-dot {
    position: absolute; top: 50%; left: 50%; width: 12px; height: 12px;
    background: #333; border-radius: 50%; transform: translate(-50%, -50%);
  }
  .direction-line {
    position: absolute; top: -20px; left: 50%; width: 4px; height: 160px;
    background: rgba(255, 0, 0, 0.5); transform: translateX(-50%); z-index: 10;
  }

  button {
    background-color: #4CAF50; color: white; border: none;
    padding: 10px 20px; font-size: 16px; border-radius: 5px; cursor: pointer;
  }
</button>
</style>
</head>
<body>

  <div class="settings">
    <button id="start-btn">コンパスを起動する</button>
    <p style="font-size: 14px; margin-top: 15px;">
      現在の偏角（西偏）: <input type="number" id="declination" value="7.5" step="0.1" style="width: 60px;"> 度<br>
      <small>※名古屋周辺は約7.5度です。</small>
    </p>
  </div>

  <div class="compass-wrapper">
    <div class="direction-line"></div>
    <div class="center-dot"></div>
    
    <div class="dial" id="dial">
      <div class="label n">真北</div>
      <div class="label e">東</div>
      <div class="label s">南</div>
      <div class="label w">西</div>
      <div class="mag-n" id="mag-n">磁北</div>
    </div>
  </div>

  <script>
    const startBtn = document.getElementById('start-btn');
    const dial = document.getElementById('dial');
    const magN = document.getElementById('mag-n');
    const declinationInput = document.getElementById('declination');

    // 偏角の設定が変更されたら磁北の表示位置をアップデート
    declinationInput.addEventListener('change', (e) => {
        const decl = parseFloat(e.target.value) || 0;
        magN.style.transform = `translateX(-50%) rotate(-${decl}deg)`;
    });

    // コンパス起動ボタン（iOS 13以降はユーザーの許可が必須なため）
    startBtn.addEventListener('click', () => {
      // iOS向けの許可リクエスト
      if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
        DeviceOrientationEvent.requestPermission()
          .then(permissionState => {
            if (permissionState === 'granted') {
              window.addEventListener('deviceorientation', handleOrientation);
              startBtn.textContent = '取得中...';
            } else {
              alert('センサーへのアクセスが拒否されました。設定を確認してください。');
            }
          })
          .catch(console.error);
      } else {
        // Android等の場合
        window.addEventListener('deviceorientationabsolute', handleOrientation);
        window.addEventListener('deviceorientation', handleOrientation);
        startBtn.textContent = '取得中...';
      }
    });

    // センサーの値を処理する関数
    function handleOrientation(event) {
      let heading = null;

      // iOS (webkitCompassHeading) は磁北を基準とした角度を返す
      if (event.webkitCompassHeading !== undefined) {
        heading = event.webkitCompassHeading;
      } 
      // Android
      else if (event.alpha !== null) {
        // Androidは機種によって挙動が違うことが多いですが、一般的な計算式
        if (event.absolute || event.webkitCompassHeading === undefined) {
           heading = 360 - event.alpha;
        }
      }

      if (heading !== null) {
        // 偏角（磁北と真北のズレ）を取得
        const declination = parseFloat(declinationInput.value) || 0;
        
        // 真北を基準とした角度を計算（西偏の場合、磁北から偏角分を引く）
        const trueHeading = heading - declination;

        // スマホの向きに合わせて盤面を逆回転させる
        dial.style.transform = `rotate(${-trueHeading}deg)`;
      }
    }
  </script>
</body>
</html>
